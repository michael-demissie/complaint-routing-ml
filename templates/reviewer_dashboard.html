<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reviewer Dashboard</title>

    <script>
        const BASE_URL = window.location.origin;
        
        const token = localStorage.getItem("token");
    
        if (!token) {
            window.location.replace("03_login.html");
        }
    </script>
    
<style>

html, body {
    height: 100%;
    margin: 0;
}

body {
    display: flex;
    flex-direction: column;
    height: 100vh;      /* full screen */
    overflow: hidden;   
    font-family: Arial, sans-serif;
    background-color: #f5f7fa;
}

/* Header */
.header {
    padding-top: 30px;
    padding-bottom: 30px;
    display: flex;
    align-items: center;
    height: 60px;
    overflow: hidden;
}

.logout-btn {
    margin-left: auto;
    margin-right: 20px;
    padding: 8px 16px;
    background-color: #e74c3c;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.logout-btn:hover {
    background-color: #c0392b;
}
    
.header img {
    height: 200px;
}

.separator {
    height: 40px;
    background-color: #0c3c52;
    flex-shrink: 0;   
}


/* Layout */
.container {
    flex: 1;
    overflow: hidden;
    padding: 20px;
    display: flex;
    flex-direction: column;
}

#departmentTitle {
    text-align: center;
    color: #0c3c52;
    margin-bottom: 10px;
    font-size: 22px;
    font-weight: bold;
}

/* Column */
.column {
    background: #ffffff;
    border-radius: 8px;
    padding: 10px;
    height: 100%;
    overflow-y: auto;
    padding-bottom: 20px; 
}

.column {
    scrollbar-width: thin;
}
.column h3 {
    text-align: center;
    color: #0c3c52;
}

#reviewCol {
    flex: 1;
}
    
/* Card */
.card {
    background: #f9fafc;
    padding: 12px;
    margin-bottom: 12px;
    border-radius: 6px;
    cursor: pointer;
}

.card:hover {
    background: #eef3f7;
}

.card-title {
    font-weight: bold;
}

/* Meta */
.card-meta {
    margin-top: 10px;
    font-size: 14px;
    color: #6b7280;
}

.customer-name {
    font-weight: 600;
    color: #0c3c52;
}

.user-id {
    font-size: 12px;
    background-color: #eef3f7;
    padding: 2px 6px;
    border-radius: 4px;
    color: #374151;
}

.date {
    margin-top: 4px;
    font-size: 12px;
    color: #9ca3af;
}

/* Confidence box */
.confidence-text {
    margin-top: 10px;
    padding: 8px;
    font-size: 12px;
    background-color: #fff5f5;
    border-left: 3px solid #e74c3c;
    border-radius: 4px;
    line-height: 1.5;
}

.confidence-text b {
    color: #0c3c52;
}

/* Full text */
.full-text {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
    margin-top: 0;
    font-size: 13px;
}

.full-text.open {
    max-height: 300px;   /* enough for most complaints */
    margin-top: 10px;
}

/* Footer */
footer {
    background-color: #0c3c52;
    color: white;
    text-align: center;
    padding: 20px;
}

</style>
</head>

<body>

<div class="header">
    <a href="">
       <img src="/static/logo.png" alt="logo">
    </a>

    <button id="logoutBtn" class="logout-btn">
        Logout
    </button>
</div>

<div class="separator"></div>

<div class="container">

    <h2 id="departmentTitle">Reviewer Dashboard</h2>
    <p style="text-align:center; font-size:13px; color:#6b7280; margin-bottom:10px;">
The complaints below require manual review. Our model was unable to confidently determine 
the appropriate department or priority level for these cases.
    </p>

    <div class="column" id="reviewCol"></div>

</div>

<footer>
    FinResolve Reviewer Panel
</footer>

<script>

function formatDate(d) {
    const date = new Date(d);

    const formattedDate = date.toLocaleDateString(undefined, {
        month: "long",
        day: "numeric"
    });

    const formattedTime = date.toLocaleTimeString(undefined, {
        hour: "numeric",
        minute: "2-digit"
    });

    return `Submitted on ${formattedDate} at ${formattedTime}`;
}

// Load reviewer complaints
async function loadReviewerComplaints() {
    const token = localStorage.getItem("token");

    const res = await fetch(`${BASE_URL}/reviewer-complaints`, {
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    const data = await res.json();
    const column = document.getElementById("reviewCol");

    data.forEach(c => {

        const card = document.createElement("div");
        card.className = "card";

        const deptConf = c.department_confidence_score
            ? (c.department_confidence_score * 100).toFixed(1)
            : "N/A";

        const prioConf = c.priority_confidence_score
            ? (c.priority_confidence_score * 100).toFixed(1)
            : "N/A";

        // Determine issue
        let message = "";

        // Case 1: Department missing
        if (!c.predicted_department) {
            message = `
                The routing model could not determine the appropriate department 
                (confidence: <b>${deptConf}%</b>).
                The priority classifier assigned 
                <b>${c.predicted_priority}</b> with 
                <b>${prioConf}% confidence</b>.
            `;
        }
        
        // Case 2: Priority missing
        else if (!c.predicted_priority) {
            message = `
                The routing model predicted 
                <b>${c.predicted_department}</b> with 
                <b>${deptConf}% confidence</b>.
                The priority classifier could not determine a priority level 
                (confidence: <b>${prioConf}%</b>).
            `;
        }
        
        // Case 3: Both exist but low confidence
        else {
            message = `
                The routing model predicted 
                <b>${c.predicted_department}</b> with 
                <b>${deptConf}% confidence</b>, and the priority classifier assigned 
                <b>${c.predicted_priority}</b> with 
                <b>${prioConf}% confidence</b>. 
                However, the confidence levels are low and require manual review.
            `;
        }
        card.innerHTML = `
            <div class="card-title">
                ${c.complaint_text.slice(0, 60)}...
            </div>
        
            <div class="card-meta">
                <div>
                    Submitted by 
                    <span class="customer-name">${c.customer_name}</span> 
                    <span class="user-id">(User ID: ${c.user_id})</span>
                </div>
                <div class="date">
                    ${formatDate(c.created_at)}
                </div>
            </div>
        
            <div class="confidence-text">
                ⚠ ${message}
            </div>
        
            <div class="full-text">
                ${c.complaint_text}
            </div>
        `;

        // toggle full text
        card.addEventListener("click", () => {
            const fullText = card.querySelector(".full-text");
            const isOpen = fullText.classList.contains("open");
            
            // close all
            document.querySelectorAll(".full-text").forEach(el => el.classList.remove("open"));
            
            // open clicked one
            if (!isOpen) {
                fullText.classList.add("open");
            }
        });

        column.appendChild(card);
    });
}

const logoutBtn = document.getElementById("logoutBtn");

logoutBtn.addEventListener("click", () => {
    // remove token
    localStorage.removeItem("token");

    // redirect to login
    window.location.replace("03_login.html");
});
window.onload = loadReviewerComplaints;

</script>

</body>
</html>
