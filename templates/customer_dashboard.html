<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script>
        const BASE_URL = window.location.origin;
        
        const token = localStorage.getItem("token");
    
        if (!token) {
            window.location.replace("/login");
        }
    </script>
    
    <style>
    
    html, body {
        height: 100%;
        margin: 0;
    }
    
    body {
        display: flex;
        flex-direction: column;
        height: 100vh;     
        overflow: hidden;   
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background: linear-gradient(180deg, #f5f7fa, #eaf1f5);
        background-color: #f5f7fa;
    }
    
    .header {
        padding-top: 30px;
        display: flex;
        justify-content: space-between; 
        align-items: center;
        height: 60px;
        overflow: hidden;
        padding-left: 20px;
        padding-right: 20px;
    }
    
    .logout-btn {
        padding: 8px 15px;
        background-color: #e74c3c;
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 4px;
    }
    
    .logout-btn:hover {
        background-color: #c0392b;
    }
    
    .header img {
        height: 200px;
    }
    
    .separator {
        height: 40px;
        background-color: #0c3c52;
        background: linear-gradient(90deg, #0c3c52, #145a7a);
        width: 100%;
        flex-shrink: 0;
    }
    
    .container {
        flex: 1;
        overflow-y: auto;  
        padding: 40px;
        padding-top: 0;
}
    
    .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 40px;
        padding-bottom: 0px;
    }
    
    .top-bar h2 {
        color: #0c3c52;
    }
    
    .create-btn {
        padding: 10px 15px;
        background-color: #0c3c52;
        color: white;
        border: none;
        cursor: pointer;
    }
    
    .create-btn:hover {
        background-color: #145a7a;
    }
    
    .complaint-list {
        margin-top: 20px;
        max-height: 500px;
        overflow-y: auto;
    }
    
    .card {
        background: white;
        padding: 15px;
        margin-bottom: 10px;
        border-radius: 6px;
        cursor: pointer;
    }
    
    .card:not(.fr-complaint-card):hover {
        background: #eef3f7;
    }
    
    .card-title {
        font-weight: bold;
        margin-bottom: 5px;
    }
    
    .card-date {
        font-size: 13px;
        color: #666;
    }
    
    .badges {
        margin-top: 10px;
        font-size: 12px;
    }
    
    .badge {
        display: inline-block;
        padding: 4px 8px;
        margin-right: 5px;
        border-radius: 4px;
        color: white;
    }
    
    .department { background: #0c3c52; }
    .priority-high { background: #e74c3c; }
    .priority-medium { background: #f39c12; }
    .priority-low { background: #2ecc71; }

    /* Full complaint expand — [hidden] toggled in JS */
    .fr-expand-wrap { margin-top: 12px; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(10,37,64,0.06); }
    .fr-expand-trigger {
        display: flex; align-items: center; justify-content: space-between; width: 100%;
        padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 10px;
        background: linear-gradient(180deg, #fff, #f9fafb); font: inherit; font-size: 13px; font-weight: 600;
        color: #0c3c52; cursor: pointer;
    }
    .fr-expand-trigger:hover { border-color: #2dd4bf; }
    .fr-expand-chevron { flex-shrink: 0; margin-left: 8px; transition: transform 0.35s ease; color: #145a7a; }
    .fr-expand-trigger[aria-expanded="true"] .fr-expand-chevron { transform: rotate(180deg); }
    .fr-expand-label { flex: 1; text-align: left; }
    .fr-complaint-panel[hidden] { display: none !important; }
    .fr-expand-wrap.is-open .fr-expand-trigger { border-radius: 10px 10px 0 0; border-bottom-color: transparent; }
    .fr-complaint-detail {
        padding: 12px 14px 14px 16px; border: 1px solid #e5e7eb; border-top: none; border-radius: 0 0 10px 10px;
        background: #fafbfc; font-size: 13px; line-height: 1.55;
    }
    .fr-complaint-body { margin: 0; white-space: pre-wrap; word-break: break-word; max-height: min(50vh, 360px); overflow-y: auto; }
    .card.fr-complaint-card { cursor: default; }
    .card.fr-complaint-card:hover { background: #fff; box-shadow: 0 1px 4px rgba(10,37,64,0.08); }
    
    footer {
        background-color: #0c3c52;
        color: white;
        text-align: center;
        padding: 30px;
        flex-shrink: 0;
    }
    
    </style>
</head>

<body>

   <div class="header">
        <a href="">
            <img src="/static/logo.png" alt="Logo">
        </a>
    
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
    
    <div class="separator"></div>
    <div class="top-bar">
            <h2>Your Complaints</h2>
            <button class="create-btn" onclick="goToCreate()">+ New Complaint</button>
    </div>
    
    <div class="container">
    
        <div class="complaint-list" id="complaintList"></div>
    
    </div>
    
    <footer>
        <p><strong>FinResolve System</strong></p>
        <p>Helping users resolve financial complaints efficiently and transparently.</p>
    </footer>

    <script>

        function logout() {
            localStorage.removeItem("token");   // remove auth
            window.location.replace("/login")  // redirect
        }
        
        function goToCreate() {
            window.location.href = "/complaint-submission";
        }
        
        // Format date nicely
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleString(); // includes time
        }
        
        function setComplaintExpanded(wrap, open) {
            const panel = wrap.querySelector(".fr-complaint-panel");
            const btn = wrap.querySelector(".fr-expand-trigger");
            const label = btn.querySelector(".fr-expand-label");
            wrap.classList.toggle("is-open", open);
            panel.classList.toggle("is-open", open);
            if (open) {
                panel.removeAttribute("hidden");
            } else {
                panel.setAttribute("hidden", "");
            }
            btn.setAttribute("aria-expanded", String(open));
            label.textContent = open ? "Hide full complaint" : "View full complaint";
        }
        
        // Load complaints from backend
        async function loadComplaints() {
            const token = localStorage.getItem("token");
        
            try {
                const response = await fetch(`${BASE_URL}/my-complaints`, {
                    headers: {
                        "Authorization": "Bearer " + token
                    }
                });
        
                const data = await response.json();
                const container = document.getElementById("complaintList");
        
                container.innerHTML = "";
        
                if (data.length === 0) {
                    container.innerHTML = "<p>No complaints submitted yet.</p>";
                    return;
                }
        
                data.forEach(c => {
        
                    const preview = c.complaint_text.slice(0, 80) + "...";
        
                    const card = document.createElement("div");
                    card.className = "card fr-complaint-card";
        
                    let routingMessage = "";
    
                    // Case 1: both department + priority available
                    if (c.predicted_department && c.predicted_priority) {
                    
                        let timeline = "";
                    
                        if (c.predicted_priority.toLowerCase() === "critical") {
                            timeline = "within 1–2 business days";
                        } else if (c.predicted_priority.toLowerCase() === "high_priority") {
                            timeline = "within 3–4 business days";
                        } else {
                            timeline = "within 5–6 business days";
                        }
                    
                        routingMessage = `
                            This complaint has been routed to the <b>${c.predicted_department}</b> team. 
                            You can expect a resolution ${timeline}.
                        `;
                    }
                    
                    // Case 2: department missing
                    else if (!c.predicted_department) {
                        routingMessage = `
                            This complaint is currently under review. A specialist will determine the appropriate department to handle it before it is routed for resolution.
                        `;
                    }
                    
                    // Case 3: priority missing
                    else if (!c.predicted_priority) {
                        routingMessage = `
                            This complaint has been routed to the <b>${c.predicted_department}</b> team. 
                            The priority level will be assigned by a reviewer to ensure appropriate handling.
                        `;
                    }
    
                    card.innerHTML = `
                        <div class="card-title">
                            ${preview}
                        </div>
                    
                        <div class="card-date">
                            Submitted: ${formatDate(c.created_at)}
                        </div>
                    
                        <div style="margin-top:8px; font-size:13px; color:#374151; line-height:1.5;">
                            ${routingMessage}
                        </div>
                    
                        <div class="fr-expand-wrap">
                            <button type="button" class="fr-expand-trigger" aria-expanded="false">
                                <span class="fr-expand-label">View full complaint</span>
                                <svg class="fr-expand-chevron" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M7 10l5 5 5-5z"/></svg>
                            </button>
                            <div class="fr-complaint-panel" hidden>
                                <div class="fr-complaint-panel-inner">
                                    <div class="fr-complaint-detail">
                                        <p class="fr-complaint-body"></p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
        
                    const wrap = card.querySelector(".fr-expand-wrap");
                    card.querySelector(".fr-complaint-body").textContent = c.complaint_text;

                    card.querySelector(".fr-expand-trigger").addEventListener("click", (e) => {
                        e.stopPropagation();
                        const panel = wrap.querySelector(".fr-complaint-panel");
                        const opening = panel.hasAttribute("hidden");
                        document.querySelectorAll(".complaint-list .fr-expand-wrap").forEach(w => {
                            setComplaintExpanded(w, false);
                        });
                        if (opening) {
                            setComplaintExpanded(wrap, true);
                        }
                    });
        
                    container.appendChild(card);
                });
        
            } catch (err) {
                console.error(err);
            }
        }
        
        document.addEventListener("click", function(e) {
            if (!e.target.closest(".complaint-list .card")) {
                document.querySelectorAll(".complaint-list .fr-expand-wrap").forEach(w => {
                    setComplaintExpanded(w, false);
                });
            }
        });
        
        // load on page open
        window.onload = loadComplaints;
    
    </script>
    
</body>
</html>
