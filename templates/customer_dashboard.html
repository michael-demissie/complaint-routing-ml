<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Dashboard</title>

    <script>
        const BASE_URL = window.location.origin;
        
        const token = localStorage.getItem("token");
    
        if (!token) {
            window.location.replace("login.html");
        }
    </script>
    
    <style>
    
    html, body {
        height: 100%;
        margin: 0;
    }
    
    body {
        display: flex;
        flex-direction: column;
        height: 100vh;     
        overflow: hidden;   
        font-family: Arial, sans-serif;
        background-color: #f5f7fa;
    }
    
    .header {
        padding-top: 30px;
        display: flex;
        justify-content: space-between; 
        align-items: center;
        height: 60px;
        overflow: hidden;
        padding-left: 20px;
        padding-right: 20px;
    }
    
    .logout-btn {
        padding: 8px 15px;
        background-color: #e74c3c;
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 4px;
    }
    
    .logout-btn:hover {
        background-color: #c0392b;
    }
    
    .header img {
        height: 200px;
    }
    
    .separator {
        height: 40px;
        background-color: #0c3c52;
        width: 100%;
        flex-shrink: 0;
    }
    
    .container {
        flex: 1;
        overflow-y: auto;  
        padding: 40px;
        padding-top: 0;
}
    
    .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 40px;
        padding-bottom: 0px;
    }
    
    .top-bar h2 {
        color: #0c3c52;
    }
    
    .create-btn {
        padding: 10px 15px;
        background-color: #0c3c52;
        color: white;
        border: none;
        cursor: pointer;
    }
    
    .create-btn:hover {
        background-color: #145a7a;
    }
    
    .complaint-list {
        margin-top: 20px;
        max-height: 500px;
        overflow-y: auto;
    }
    
    .card {
        background: white;
        padding: 15px;
        margin-bottom: 10px;
        border-radius: 6px;
        cursor: pointer;
    }
    
    .card:hover {
        background: #eef3f7;
    }
    
    .card-title {
        font-weight: bold;
        margin-bottom: 5px;
    }
    
    .card-date {
        font-size: 13px;
        color: #666;
    }
    
    .badges {
        margin-top: 10px;
        font-size: 12px;
    }
    
    .badge {
        display: inline-block;
        padding: 4px 8px;
        margin-right: 5px;
        border-radius: 4px;
        color: white;
    }
    
    .department { background: #0c3c52; }
    .priority-high { background: #e74c3c; }
    .priority-medium { background: #f39c12; }
    .priority-low { background: #2ecc71; }

    .full-text {
        display: none;
        margin-top: 10px;
        padding: 10px;
        background: #f9fafc;
        border-radius: 5px;
        line-height: 1.6;
    }
    
    footer {
        background-color: #0c3c52;
        color: white;
        text-align: center;
        padding: 30px;
        flex-shrink: 0;
    }
    
    </style>
</head>

<body>

   <div class="header">
        <a href="">
            <img src="/static/logo.png" alt="Logo">
        </a>
    
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
    
    <div class="separator"></div>
    <div class="top-bar">
            <h2>Your Complaints</h2>
            <button class="create-btn" onclick="goToCreate()">+ New Complaint</button>
    </div>
    
    <div class="container">
    
        <div class="complaint-list" id="complaintList"></div>
    
    </div>
    
    <footer>
        <p><strong>FinResolve System</strong></p>
        <p>Helping users resolve financial complaints efficiently and transparently.</p>
    </footer>
    
    <script>

        function logout() {
            localStorage.removeItem("token");   // remove auth
            window.location.href = "login.html";  // redirect
        }
        
        function goToCreate() {
            window.location.href = "complaint_submission.html";
        }
        
        // Format date nicely
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleString(); // includes time
        }
        
        // Priority badge class
        function getPriorityClass(priority) {
            if (!priority) return "priority-high";
            if (priority.toLowerCase() === "immediate") return "priority-high";
            if (priority.toLowerCase() === "same_day") return "priority-medium";
            return "priority-low";
        }
        
        // Load complaints from backend
        async function loadComplaints() {
            const token = localStorage.getItem("token");
        
            try {
                const response = await fetch(`${BASE_URL}/my-complaints`, {
                    headers: {
                        "Authorization": "Bearer " + token
                    }
                });
        
                const data = await response.json();
                const container = document.getElementById("complaintList");
        
                container.innerHTML = "";
        
                if (data.length === 0) {
                    container.innerHTML = "<p>No complaints submitted yet.</p>";
                    return;
                }
        
                data.forEach(c => {
        
                    const preview = c.complaint_text.slice(0, 80) + "...";
                    const priorityClass = getPriorityClass(c.predicted_priority);
        
                    const card = document.createElement("div");
                    card.className = "card";
        
                    let routingMessage = "";
    
                    // Case 1: both department + priority available
                    if (c.predicted_department && c.predicted_priority) {
                    
                        let timeline = "";
                    
                        if (c.predicted_priority.toLowerCase() === "immediate") {
                            timeline = "within 1–2 business days";
                        } else if (c.predicted_priority.toLowerCase() === "same_day") {
                            timeline = "within 3–4 business days";
                        } else {
                            timeline = "within 5–6 business days";
                        }
                    
                        routingMessage = `
                            This complaint has been routed to the <b>${c.predicted_department}</b> team. 
                            You can expect a resolution ${timeline}.
                        `;
                    }
                    
                    // Case 2: department missing
                    else if (!c.predicted_department) {
                        routingMessage = `
                            This complaint is currently under review. A specialist will determine the appropriate department to handle it before it is routed for resolution.
                        `;
                    }
                    
                    // Case 3: priority missing
                    else if (!c.predicted_priority) {
                        routingMessage = `
                            This complaint has been routed to the <b>${c.predicted_department}</b> team. 
                            The priority level will be assigned by a reviewer to ensure appropriate handling.
                        `;
                    }
    
                    card.innerHTML = `
                        <div class="card-title">
                            ${preview}
                        </div>
                    
                        <div class="card-date">
                            Submitted: ${formatDate(c.created_at)}
                        </div>
                    
                        <div style="margin-top:8px; font-size:13px; color:#374151; line-height:1.5;">
                            ${routingMessage}
                        </div>
                    
                        <div class="full-text">
                            <div style="line-height:1.6;">
                                ${c.complaint_text}
                            </div>
                            <button class="close-btn">Close</button>
                        </div>
                    `;
        
                    // click to expand ONLY top area
                    card.querySelector(".card-title").addEventListener("click", () => openCard(card));
                    card.querySelector(".card-date").addEventListener("click", () => openCard(card));
        
                    // close button
                    card.querySelector(".close-btn").addEventListener("click", (e) => {
                        e.stopPropagation();
                        closeCard(card);
                    });
        
                    container.appendChild(card);
                });
        
            } catch (err) {
                console.error(err);
            }
        }
        
        // open card
        function openCard(card) {
            document.querySelectorAll(".full-text").forEach(el => el.style.display = "none");
            card.querySelector(".full-text").style.display = "block";
        }
        
        // close card
        function closeCard(card) {
            card.querySelector(".full-text").style.display = "none";
        }
        
        // click outside closes all
        document.addEventListener("click", function(e) {
            if (!e.target.closest(".card")) {
                document.querySelectorAll(".full-text").forEach(el => {
                    el.style.display = "none";
                });
            }
        });
        
        // load on page open
        window.onload = loadComplaints;
    
    </script>

</body>
</html>
