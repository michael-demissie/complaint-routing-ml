<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reviewer Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script>
        const BASE_URL = window.location.origin;
        
        const token = localStorage.getItem("token");
    
        if (!token) {
            window.location.replace("/login");
        }
    </script>
    
<style>

html, body {
    height: 100%;
    margin: 0;
}

body {
    display: flex;
    flex-direction: column;
    height: 100vh;      /* full screen */
    overflow: hidden;   
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(180deg, #f5f7fa, #eaf1f5);
    background-color: #f5f7fa;
}

/* Header */
.header {
    padding-top: 30px;
    padding-bottom: 30px;
    display: flex;
    align-items: center;
    height: 60px;
    overflow: hidden;
}

.logout-btn {
    margin-left: auto;
    margin-right: 20px;
    padding: 8px 16px;
    background-color: #e74c3c;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.logout-btn:hover {
    background-color: #c0392b;
}
    
.header img {
    height: 200px;
}

.separator {
    height: 40px;
    background-color: #0c3c52;
    background: linear-gradient(90deg, #0c3c52, #145a7a);
    flex-shrink: 0;   
}


/* Layout */
.container {
    flex: 1;
    overflow: hidden;
    padding: 20px;
    display: flex;
    flex-direction: column;
}

#departmentTitle {
    text-align: center;
    color: #0c3c52;
    margin-bottom: 10px;
    font-size: 22px;
    font-weight: bold;
}

/* Column */
.column {
    background: #ffffff;
    border-radius: 8px;
    padding: 10px;
    height: 100%;
    overflow-y: auto;
    padding-bottom: 20px; 
}

.column {
    scrollbar-width: thin;
}
.column h3 {
    text-align: center;
    color: #0c3c52;
}

#reviewCol {
    flex: 1;
}
    
/* Card */
.card {
    background: #f9fafc;
    padding: 12px;
    margin-bottom: 12px;
    border-radius: 6px;
    cursor: pointer;
}

.card:not(.fr-complaint-card):hover {
    background: #eef3f7;
}

.card-title {
    font-weight: bold;
}

/* Meta */
.card-meta {
    margin-top: 10px;
    font-size: 14px;
    color: #6b7280;
}

.customer-name {
    font-weight: 600;
    color: #0c3c52;
}

.user-id {
    font-size: 12px;
    background-color: #eef3f7;
    padding: 2px 6px;
    border-radius: 4px;
    color: #374151;
}

.date {
    margin-top: 4px;
    font-size: 12px;
    color: #9ca3af;
}

/* Confidence box */
.confidence-text {
    margin-top: 10px;
    padding: 8px;
    font-size: 12px;
    background-color: #fff5f5;
    border-left: 3px solid #e74c3c;
    border-radius: 4px;
    line-height: 1.5;
}

.confidence-text b {
    color: #0c3c52;
}

/* Full complaint expand — [hidden] toggled in JS (display:none when collapsed) */
.fr-expand-wrap { margin-top: 12px; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(10,37,64,0.06); }
.fr-expand-trigger {
    display: flex; align-items: center; justify-content: space-between; width: 100%;
    padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 10px;
    background: linear-gradient(180deg, #fff, #f9fafb); font: inherit; font-size: 13px; font-weight: 600;
    color: #0c3c52; cursor: pointer;
}
.fr-expand-trigger:hover { border-color: #2dd4bf; }
.fr-expand-chevron { flex-shrink: 0; margin-left: 8px; transition: transform 0.35s ease; color: #145a7a; }
.fr-expand-trigger[aria-expanded="true"] .fr-expand-chevron { transform: rotate(180deg); }
.fr-expand-label { flex: 1; text-align: left; }
.fr-complaint-panel[hidden] { display: none !important; }
.fr-expand-wrap.is-open .fr-expand-trigger { border-radius: 10px 10px 0 0; border-bottom-color: transparent; }
.fr-complaint-detail {
    padding: 12px 14px 14px 16px; border: 1px solid #e5e7eb; border-top: none; border-radius: 0 0 10px 10px;
    background: #fafbfc; font-size: 13px; line-height: 1.55;
}
.fr-complaint-body { margin: 0; white-space: pre-wrap; word-break: break-word; max-height: min(50vh, 360px); overflow-y: auto; }
.card.fr-complaint-card { cursor: default; }
.card.fr-complaint-card:hover { background: #f9fafc; }

/* Footer */
footer {
    background-color: #0c3c52;
    color: white;
    text-align: center;
    padding: 20px;
}

</style>
</head>

<body>

<div class="header">
    <a href="">
       <img src="/static/logo.png" alt="logo">
    </a>

    <button id="logoutBtn" class="logout-btn">
        Logout
    </button>
</div>

<div class="separator"></div>

<div class="container">

    <h2 id="departmentTitle">Reviewer Dashboard</h2>
    <p style="text-align:center; font-size:13px; color:#6b7280; margin-bottom:10px;">
The complaints below require manual review. Our model was unable to confidently determine 
the appropriate department or priority level for these cases.
    </p>

    <div class="column" id="reviewCol"></div>

</div>

<footer>
    FinResolve Reviewer Panel
</footer>

<script>

function setComplaintExpanded(wrap, open) {
    const panel = wrap.querySelector(".fr-complaint-panel");
    const btn = wrap.querySelector(".fr-expand-trigger");
    const label = btn.querySelector(".fr-expand-label");
    wrap.classList.toggle("is-open", open);
    panel.classList.toggle("is-open", open);
    if (open) {
        panel.removeAttribute("hidden");
    } else {
        panel.setAttribute("hidden", "");
    }
    btn.setAttribute("aria-expanded", String(open));
    label.textContent = open ? "Hide full complaint" : "View full complaint";
}

function formatDate(d) {
    const date = new Date(d);

    const formattedDate = date.toLocaleDateString(undefined, {
        month: "long",
        day: "numeric"
    });

    const formattedTime = date.toLocaleTimeString(undefined, {
        hour: "numeric",
        minute: "2-digit"
    });

    return `Submitted on ${formattedDate} at ${formattedTime}`;
}

// Load reviewer complaints
async function loadReviewerComplaints() {
    const token = localStorage.getItem("token");

    const res = await fetch(`${BASE_URL}/reviewer-complaints`, {
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    const data = await res.json();
    const column = document.getElementById("reviewCol");

    data.forEach(c => {

        const card = document.createElement("div");
        card.className = "card fr-complaint-card";

        const deptConf = c.department_confidence_score
            ? (c.department_confidence_score * 100).toFixed(1)
            : "N/A";

        const prioConf = c.priority_confidence_score
            ? (c.priority_confidence_score * 100).toFixed(1)
            : "N/A";

        // Determine issue
        let message = "";

        // Case 1: Department missing
        if (!c.predicted_department) {
            message = `
                The routing model could not determine the appropriate department 
                (confidence: <b>${deptConf}%</b>).
                The priority classifier assigned 
                <b>${c.predicted_priority}</b> with 
                <b>${prioConf}% confidence</b>.
            `;
        }
        
        // Case 2: Priority missing
        else if (!c.predicted_priority) {
            message = `
                The routing model predicted 
                <b>${c.predicted_department}</b> with 
                <b>${deptConf}% confidence</b>.
                The priority classifier could not determine a priority level 
                (confidence: <b>${prioConf}%</b>).
            `;
        }
        
        // Case 3: Both exist but low confidence
        else {
            message = `
                The routing model predicted 
                <b>${c.predicted_department}</b> with 
                <b>${deptConf}% confidence</b>, and the priority classifier assigned 
                <b>${c.predicted_priority}</b> with 
                <b>${prioConf}% confidence</b>. 
                However, the confidence levels are low and require manual review.
            `;
        }
        card.innerHTML = `
            <div class="card-title">
                ${c.complaint_text.slice(0, 60)}...
            </div>
        
            <div class="card-meta">
                <div>
                    Submitted by 
                    <span class="customer-name">${c.customer_name}</span> 
                    <span class="user-id">(User ID: ${c.user_id})</span>
                </div>
                <div class="date">
                    ${formatDate(c.created_at)}
                </div>
            </div>
        
            <div class="confidence-text">
                ⚠ ${message}
            </div>
        
            <div class="fr-expand-wrap">
                <button type="button" class="fr-expand-trigger" aria-expanded="false">
                    <span class="fr-expand-label">View full complaint</span>
                    <svg class="fr-expand-chevron" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M7 10l5 5 5-5z"/></svg>
                </button>
                <div class="fr-complaint-panel" hidden>
                    <div class="fr-complaint-panel-inner">
                        <div class="fr-complaint-detail">
                            <p class="fr-complaint-body"></p>
                        </div>
                    </div>
                </div>
            </div>
        `;

        const wrap = card.querySelector(".fr-expand-wrap");
        card.querySelector(".fr-complaint-body").textContent = c.complaint_text;

        card.querySelector(".fr-expand-trigger").addEventListener("click", (e) => {
            e.stopPropagation();
            const panel = wrap.querySelector(".fr-complaint-panel");
            const opening = panel.hasAttribute("hidden");
            document.querySelectorAll("#reviewCol .fr-expand-wrap").forEach(w => {
                setComplaintExpanded(w, false);
            });
            if (opening) {
                setComplaintExpanded(wrap, true);
            }
        });

        column.appendChild(card);
    });
}

const logoutBtn = document.getElementById("logoutBtn");

logoutBtn.addEventListener("click", () => {
    // remove token
    localStorage.removeItem("token");

    // redirect to login
    window.location.replace("/login");
});
window.onload = loadReviewerComplaints;

</script>

</body>
</html>
